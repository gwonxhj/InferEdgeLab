name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "edgebench/**"
      - "scripts/**"
      - "Makefile"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/benchmarks.yml"
  pull_request:

permissions:
  contents: write

concurrency:
  group: benchmarks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          python -m pip install -U pip
          pip install poetry

      - name: Install deps
        run: |
          poetry install
          poetry run python -m pip install torch onnxscript

      - name: Run benchmark
        shell: bash
        run: |
          set -euxo pipefail
        
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "Running CI benchmark (no README update)"
            make ci_bench
          else
            echo "Running full demo (includes README/BENCHMARKS)"
            make demo
          fi

      - name: Enforce compare policy gate
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euxo pipefail
          make ci_policy_gate

      - name: Write compare gate summary
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euxo pipefail

          rm -f reports/ci_policy_summary_*.md reports/ci_policy_summary_all.md || true
  
          for s in 224 320 640; do
            poetry run python scripts/check_compare_policy.py \
              --pattern "results/*.json" \
              --selection-mode same_precision \
              --model toy${s}.onnx \
              --fail-on-same-precision-regression \
              --fail-on-severe-tradeoff \
              --summary-out reports/ci_policy_summary_${s}.md \
              --allow-missing-pair
          done
  
          {
            echo "# Compare Policy Gate Summary"
            echo
            cat reports/ci_policy_summary_224.md
            echo
            cat reports/ci_policy_summary_320.md
            echo
            cat reports/ci_policy_summary_640.md
          } > reports/ci_policy_summary_all.md
  
          cat reports/ci_policy_summary_all.md >> "$GITHUB_STEP_SUMMARY"

          poetry run python scripts/check_compare_policy.py \
            --pattern "results/*.json" \
            --selection-mode same_precision \
            --model toy224.onnx \
            --fail-on-same-precision-regression \
            --fail-on-severe-tradeoff \
            --summary-out reports/ci_policy_summary.md \
            --allow-missing-pair
  
          cat reports/ci_policy_summary.md >> "$GITHUB_STEP_SUMMARY"

      # ✅ raw JSON은 커밋하지 않고 artifact로만 보관
      - name: Upload raw reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgebench-reports-${{ github.run_id }}
          path: reports/*.json
          if-no-files-found: warn
          retention-days: 14

      # ✅ 문서만 커밋 (README/BENCHMARKS)
      - name: Commit docs if changed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euxo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md BENCHMARKS.md || true

          if git diff --cached --quiet; then
            echo "No doc changes"
            exit 0
          fi

          git commit -m "docs: update benchmarks (CI)"
          git push origin HEAD:main